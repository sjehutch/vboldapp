<SPAN CLASS="SectionTitle">Sharing Data or Files with Others</SPAN></B><BR><BR>

Since ProFume* gas fumigant Fumiguide* files (*.fum extension) are stored to the computer hard drive, these files can be shared with other employees of the same company via file sharing methods (CD-ROM, group electronic folders or email).<BR><BR>
